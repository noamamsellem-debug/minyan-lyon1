
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minyan Lyon</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#0D1B2A;
  color:white;
  margin:0;
}

.header{
  text-align:center;
  padding:20px;
  font-size:22px;
  font-weight:bold;
  color:#C9A84C;
}

.container{
  max-width:500px;
  margin:auto;
  padding:10px;
}

.search{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-bottom:10px;
}

.btn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#C9A84C;
  color:#0D1B2A;
  font-weight:bold;
  cursor:pointer;
  margin-bottom:10px;
}

.card{
  background:#152238;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

.title{
  font-weight:bold;
}

.time{
  color:#C9A84C;
  font-size:18px;
}

.fav{
  float:right;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">✡ Minyan Lyon</div>

<div class="container">

<input class="search" placeholder="Rechercher..." oninput="filter(this.value)">

<button class="btn" onclick="findNow()">🔍 Trouver un minyan maintenant</button>

<div id="list"></div>

</div>

<script>

const synagogues = [
  {
    id:1,
    name:"Torath Emeth",
    address:"Villeurbanne",
    sh:"6h45",
    mi:"19h10",
    ar:"21h00"
  },
  {
    id:2,
    name:"Grande Synagogue",
    address:"Lyon 2",
    sh:"7h00",
    mi:"19h00",
    ar:"21h00"
  }
];

let favs = JSON.parse(localStorage.getItem("favs")||"[]");

function saveFavs(){
  localStorage.setItem("favs", JSON.stringify(favs));
}

function toggleFav(id){
  if(favs.includes(id)){
    favs = favs.filter(x=>x!==id);
  }else{
    favs.push(id);
  }
  saveFavs();
  render();
}

function render(list = synagogues){
  const div = document.getElementById("list");
  div.innerHTML = "";

  list.forEach(s=>{
    div.innerHTML += `
      <div class="card">
        <div class="title">
          ${s.name}
          <span class="fav" onclick="toggleFav(${s.id})">
            ${favs.includes(s.id) ? "⭐" : "☆"}
          </span>
        </div>
        <div>${s.address}</div>
        <div class="time">
          🌅 ${s.sh || "-"} | ☀️ ${s.mi || "-"} | 🌙 ${s.ar || "-"}
        </div>
      </div>
    `;
  });
}

function filter(q){
  q = q.toLowerCase();
  const filtered = synagogues.filter(s =>
    s.name.toLowerCase().includes(q) ||
    s.address.toLowerCase().includes(q)
  );
  render(filtered);
}

function timeToMin(t){
  if(!t) return 9999;
  const [h,m] = t.split("h");
  return parseInt(h)*60 + parseInt(m||0);
}

function findNow(){
  const now = new Date();
  const min = now.getHours()*60 + now.getMinutes();

  const results = synagogues.map(s=>{
    return {
      ...s,
      next: Math.min(
        timeToMin(s.sh),
        timeToMin(s.mi),
        timeToMin(s.ar)
      )
    };
  }).sort((a,b)=>a.next-b.next);

  render(results);
}

render();

</script>

</body>
</html>
